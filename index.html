<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="color-scheme" content="dark">
<title>Groww</title>
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Groww">
<style>
  :root{
    --bg:#000000; --card:#121316; --card2:#1b1c21; --border:#25262c;
    --tx:#f4f5f7; --sub:#9698a1; --dim:#6b6d76;
    --green:#00c278; --red:#f2493e; --teal:#00d09c; --blue:#5c6bff;
    --sb:env(safe-area-inset-bottom,0px); --st:env(safe-area-inset-top,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--tx);-webkit-font-smoothing:antialiased;overscroll-behavior-y:none;}
  .tnum{font-variant-numeric:tabular-nums;}
  .up{color:var(--green);} .dn{color:var(--red);}
  #app{max-width:460px;margin:0 auto;min-height:100vh;min-height:100dvh;background:var(--bg);position:relative;display:flex;flex-direction:column;overflow:hidden;}

  .hdr{display:flex;align-items:center;gap:12px;padding:calc(var(--st) + 14px) 16px 12px;}
  .glogo{width:30px;height:30px;flex:none;border-radius:50%;}
  .hdr .ttl{flex:1;font-size:22px;font-weight:700;letter-spacing:-.2px;}
  .hicon{width:26px;height:26px;color:var(--tx);flex:none;}
  .avatar{width:34px;height:34px;border-radius:50%;background:#8a55d6;color:#fff;display:grid;place-items:center;font-weight:600;font-size:15px;flex:none;cursor:pointer;}

  .idxstrip{display:flex;gap:0;overflow-x:auto;padding:6px 16px 12px;border-bottom:1px solid var(--border);}
  .idxstrip::-webkit-scrollbar{display:none;}
  .idx{display:flex;align-items:center;gap:8px;padding-right:16px;margin-right:16px;border-right:1px solid var(--border);white-space:nowrap;flex:none;}
  .idx:last-child{border-right:none;}
  .idx .in{font-size:12.5px;color:var(--sub);font-weight:600;}
  .idx .iv{font-size:12.5px;color:var(--tx);font-weight:600;}
  .idx .ip{font-size:11px;font-weight:700;padding:2px 5px;border-radius:5px;display:inline-flex;align-items:center;gap:2px;}
  .idx .ip.up{background:rgba(0,194,120,.14);} .idx .ip.dn{background:rgba(242,73,62,.14);}

  .subtabs{display:flex;gap:22px;overflow-x:auto;padding:12px 16px 0;border-bottom:1px solid var(--border);}
  .subtabs::-webkit-scrollbar{display:none;}
  .stab{flex:none;padding:0 0 12px;font-size:15.5px;font-weight:600;color:var(--sub);border-bottom:2.5px solid transparent;cursor:pointer;white-space:nowrap;}
  .stab.on{color:var(--tx);border-bottom-color:var(--tx);}

  .scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(80px + var(--sb));}
  .sechd{display:flex;align-items:center;justify-content:space-between;margin:24px 16px 12px;}
  .sechd h2{font-size:19px;font-weight:700;margin:0;letter-spacing:-.2px;}
  .sechd .more{font-size:13.5px;color:var(--sub);font-weight:600;display:flex;align-items:center;gap:3px;cursor:pointer;}
  .subttl{color:var(--sub);font-size:13px;margin:-6px 16px 12px;}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px;}
  .gcard{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;cursor:pointer;}
  .gcard:active{background:var(--card2);}
  .gcard .catrow{display:flex;align-items:center;justify-content:space-between;margin:-2px 0 10px;}
  .cat{font-size:11.5px;letter-spacing:.08em;color:var(--sub);font-weight:700;}
  .logo{width:34px;height:34px;border-radius:9px;flex:none;display:grid;place-items:center;font-weight:700;font-size:12px;color:#fff;overflow:hidden;position:relative;}
  .logo img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#fff;border-radius:inherit;padding:3px;}
  .gcard .cn{font-size:14px;font-weight:600;line-height:1.3;min-height:36px;margin-bottom:8px;}
  .gcard .cn.one{min-height:0;}
  .gcard .row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
  .gcard .px{font-size:15px;font-weight:700;}
  .gcard .ch{font-size:12.5px;font-weight:600;margin-top:5px;}
  .gcard .yr{font-size:12px;color:var(--sub);}
  .toplogo{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}

  .lrow{display:flex;align-items:center;gap:13px;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;}
  .lrow:active{background:var(--card);}
  .lrow .lm{flex:1;min-width:0;}
  .lrow .ln{font-size:14.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .lrow .ls{font-size:12.5px;color:var(--sub);margin-top:3px;}
  .lrow .lr{text-align:right;flex:none;}
  .lrow .lp{font-size:14px;font-weight:700;}
  .lrow .lc{font-size:12px;margin-top:3px;font-weight:600;}
  .link{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);display:grid;place-items:center;flex:none;color:var(--sub);}
  .link svg{width:17px;height:17px;}

  .pills{display:flex;gap:10px;align-items:center;padding:2px 16px 4px;}
  .pill{padding:8px 18px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--sub);font-size:13.5px;font-weight:600;cursor:pointer;white-space:nowrap;}
  .pill.on{color:var(--tx);border-color:var(--tx);}
  .pill.dd{display:flex;align-items:center;gap:6px;}
  .vdiv{width:1px;height:20px;background:var(--border);}

  .tscard{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px;cursor:pointer;overflow:hidden;}
  .tstag{display:inline-block;font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;margin-bottom:8px;}
  .tstag.bull{background:rgba(0,194,120,.14);color:var(--green);}
  .tstag.bear{background:rgba(242,73,62,.14);color:var(--red);}
  .tscard canvas{width:100%;height:70px;display:block;}
  .tscard .tsn{font-size:13.5px;font-weight:600;margin-top:8px;}

  .ptrow{display:flex;justify-content:space-between;padding:6px 16px 4px;overflow-x:auto;}
  .ptrow::-webkit-scrollbar{display:none;}
  .pt{display:flex;flex-direction:column;align-items:center;gap:8px;flex:none;width:70px;cursor:pointer;position:relative;}
  .pt .pic{width:38px;height:38px;color:var(--teal);}
  .pt .pl{font-size:12px;color:var(--tx);font-weight:500;}
  .pt .badge{position:absolute;top:-4px;right:14px;background:var(--tx);color:#000;font-size:9px;font-weight:700;border-radius:8px;min-width:15px;height:15px;display:grid;place-items:center;}

  .seccard{margin:0 16px;background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
  .secrow{display:flex;align-items:center;gap:12px;padding:15px 14px;border-bottom:1px solid var(--border);}
  .secrow .snm{flex:1;font-size:14px;font-weight:500;}
  .secbar{width:120px;height:6px;border-radius:3px;background:#2a2b31;position:relative;overflow:hidden;flex:none;}
  .secbar i{position:absolute;top:0;bottom:0;border-radius:3px;}
  .secrow .spct{width:64px;text-align:right;font-size:13.5px;font-weight:700;}
  .secmore{text-align:center;padding:14px;font-size:13.5px;color:var(--sub);font-weight:600;cursor:pointer;}

  .sumcard{margin:16px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;}
  .sumcard .stop{display:flex;align-items:flex-start;justify-content:space-between;}
  .sumcard .cap{font-size:12px;letter-spacing:.08em;color:var(--sub);font-weight:700;}
  .sumcard .big{font-size:28px;font-weight:700;margin-top:6px;letter-spacing:-.5px;}
  .rndbtn{width:38px;height:38px;border-radius:50%;border:1px solid var(--border);display:grid;place-items:center;color:var(--sub);cursor:pointer;}
  .rndbtn svg{width:19px;height:19px;}
  .dash{border-top:1px dashed var(--border);margin:16px 0;}
  .kv{display:flex;justify-content:space-between;padding:7px 0;font-size:14.5px;}
  .kv .k{color:var(--sub);display:flex;align-items:center;gap:5px;}
  .kv .v{font-weight:600;}

  .outbtn{display:flex;align-items:center;justify-content:center;gap:10px;margin:8px 16px;padding:14px;border:1px solid var(--border);border-radius:12px;color:var(--tx);font-weight:600;font-size:14.5px;cursor:pointer;background:transparent;width:calc(100% - 32px);}
  .outbtn svg{width:18px;height:18px;}
  .filterbtn{width:40px;height:40px;border-radius:50%;border:1px solid var(--border);display:grid;place-items:center;color:var(--sub);cursor:pointer;flex:none;}
  .curtoggle{font-size:13.5px;color:var(--sub);font-weight:600;display:flex;align-items:center;gap:6px;border-bottom:1px dashed var(--border);padding-bottom:2px;}

  .promo{margin:20px 16px 0;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;display:flex;flex-direction:column;gap:16px;position:relative;overflow:hidden;}
  .promo h3{font-size:19px;font-weight:700;margin:0;max-width:62%;line-height:1.35;}
  .promo .startbtn{background:var(--teal);color:#00312a;font-weight:700;font-size:15px;padding:12px 22px;border-radius:10px;border:none;align-self:flex-start;cursor:pointer;}
  .promo .cal{position:absolute;right:20px;bottom:18px;font-size:64px;line-height:1;}

  .sipbig{margin:16px;background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
  .sipbig .top{padding:18px;}
  .sipbig .upg{display:flex;align-items:center;gap:10px;padding:15px 18px;border-top:1px solid var(--border);font-size:14px;color:var(--tx);cursor:pointer;}
  .sipbig .upg svg{width:20px;height:20px;color:var(--blue);}
  .sipbig .upg .ch{margin-left:auto;color:var(--sub);}
  .sipitem{display:flex;align-items:center;gap:13px;padding:16px;cursor:pointer;}
  .sipitem .sm{flex:1;}
  .sipitem .snn{font-size:14.5px;font-weight:600;}
  .sipitem .sa{font-size:13px;color:var(--sub);margin-top:3px;}
  .datebox{border:1px solid var(--border);border-radius:8px;padding:6px 12px;text-align:center;flex:none;}
  .datebox .d{font-size:16px;font-weight:700;line-height:1;} .datebox .m{font-size:11px;color:var(--sub);margin-top:2px;}

  .scalper{margin:14px 16px 0;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:15px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;}
  .scalper .sn{flex:1;font-weight:700;font-size:16px;}
  .scalper .tap{background:rgba(92,107,255,.16);color:var(--blue);font-size:12px;font-weight:700;padding:5px 10px;border-radius:7px;}

  .empty{text-align:center;color:var(--sub);padding:56px 24px;font-size:14px;line-height:1.6;}
  .about{padding:28px 24px calc(24px + var(--sb));text-align:center;}
  .about .ah{display:flex;align-items:center;justify-content:center;gap:6px;font-size:14.5px;color:var(--tx);font-weight:600;margin-bottom:14px;}
  .about p{font-size:11.5px;color:var(--dim);line-height:1.7;margin:0;}

  .nav{position:sticky;bottom:0;background:#050506;border-top:1px solid var(--border);display:flex;padding:9px 0 calc(9px + var(--sb));z-index:20;}
  .navb{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--sub);font-size:11px;font-weight:600;cursor:pointer;}
  .navb svg{width:24px;height:24px;}
  .navb.on{color:var(--blue);}

  .detail{position:fixed;inset:0;max-width:460px;margin:0 auto;background:var(--bg);z-index:60;transform:translateX(100%);transition:transform .28s cubic-bezier(.2,.7,.2,1);display:flex;flex-direction:column;}
  .detail.open{transform:translateX(0);}
  .dbar{display:flex;align-items:center;gap:10px;padding:calc(var(--st) + 12px) 12px 12px 6px;border-bottom:1px solid transparent;}
  .dbar .dt{flex:1;min-width:0;}
  .dbar .dt .n{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .dbar .dt .s{font-size:11.5px;color:var(--sub);}
  .dscroll{flex:1;overflow-y:auto;padding:10px 18px calc(104px + var(--sb));}
  .dprice{font-size:28px;font-weight:700;letter-spacing:-.5px;}
  .dchg{font-size:14px;font-weight:600;margin-top:3px;}
  .dchart{width:100%;height:170px;display:block;margin:16px 0 6px;}
  .rng{display:flex;gap:6px;margin:4px 0 20px;}
  .rb{flex:1;padding:7px 0;text-align:center;border-radius:8px;border:none;background:var(--card);color:var(--sub);font-weight:700;font-size:12px;cursor:pointer;}
  .rb.on{background:var(--teal);color:#00312a;}
  .stat{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--border);border-radius:14px;overflow:hidden;}
  .stat .c{padding:13px 15px;} .stat .c:nth-child(odd){border-right:1px solid var(--border);}
  .stat .c:not(:nth-last-child(-n+2)){border-bottom:1px solid var(--border);}
  .stat .l{font-size:12px;color:var(--sub);} .stat .v{font-size:14.5px;font-weight:700;margin-top:3px;}
  .ownb{margin-top:16px;background:var(--card);border-radius:14px;padding:14px 16px;}
  .ownb .kv{border:none;padding:6px 0;}
  .actbar{position:absolute;bottom:0;left:0;right:0;display:flex;gap:12px;padding:14px 16px calc(16px + var(--sb));background:var(--bg);border-top:1px solid var(--border);}
  .btn{flex:1;padding:15px;border-radius:12px;border:none;font-weight:700;font-size:16px;cursor:pointer;}
  .bsell{background:#2a1c1c;color:var(--red);} .bbuy{background:var(--teal);color:#00312a;}
  .btn:disabled{opacity:.4;}

  .bd{position:fixed;inset:0;background:rgba(0,0,0,.6);opacity:0;pointer-events:none;transition:opacity .25s;z-index:70;}
  .bd.open{opacity:1;pointer-events:auto;}
  .sheet{position:fixed;left:50%;transform:translate(-50%,100%);bottom:0;width:100%;max-width:460px;background:#141519;border-radius:20px 20px 0 0;z-index:80;transition:transform .3s cubic-bezier(.2,.7,.2,1);max-height:90vh;display:flex;flex-direction:column;border:1px solid var(--border);border-bottom:none;}
  .sheet.open{transform:translate(-50%,0);}
  .grip{width:38px;height:4px;border-radius:2px;background:var(--border);margin:10px auto 4px;}
  .shd{display:flex;align-items:center;justify-content:space-between;padding:8px 18px 12px;border-bottom:1px solid var(--border);}
  .shd h2{font-size:17px;margin:0;} .lk{background:none;border:none;color:var(--teal);font-weight:600;font-size:14px;cursor:pointer;}
  .sbody{overflow-y:auto;padding:16px 18px calc(20px + var(--sb));}
  .ttop{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
  .ttop .n{font-weight:700;font-size:15px;} .ttop .p{font-size:13px;color:var(--sub);margin-top:2px;}
  .qr{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-top:1px solid var(--border);}
  .qr .k{font-size:14px;color:var(--sub);} .qr .qv{font-weight:700;font-size:15px;}
  .step{display:flex;align-items:center;gap:14px;}
  .step button{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:var(--card2);color:var(--tx);font-size:20px;cursor:pointer;}
  .step input{width:54px;text-align:center;font-size:17px;font-weight:700;border:none;background:none;color:var(--tx);}
  .fld{margin-bottom:14px;} .fld label{display:block;font-size:12px;color:var(--sub);font-weight:600;margin-bottom:6px;}
  .fld input{width:100%;padding:12px;border-radius:10px;font-size:15px;border:1px solid var(--border);background:var(--card);color:var(--tx);}
  .fld input:focus{outline:2px solid var(--teal);}
  .chips{display:flex;gap:8px;margin:-2px 0 14px;}
  .chip{flex:1;padding:9px 0;border-radius:9px;border:1px solid var(--border);background:var(--card);color:var(--sub);font-weight:700;font-size:13px;cursor:pointer;}
  .save{width:100%;padding:14px;border-radius:12px;border:none;background:var(--teal);color:#00312a;font-weight:700;font-size:15.5px;cursor:pointer;margin-top:12px;}
  .save:disabled{opacity:.4;}
  .balline{display:flex;justify-content:space-between;font-size:12.5px;color:var(--sub);margin-top:6px;}
  .hint{font-size:12px;color:var(--sub);text-align:center;margin-top:10px;}
  .toast{position:fixed;left:50%;bottom:calc(30px + var(--sb));transform:translate(-50%,20px);background:#fff;color:#000;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:600;z-index:100;opacity:0;pointer-events:none;transition:.25s;max-width:88%;text-align:center;}
  .toast.show{opacity:1;transform:translate(-50%,0);}
  .searchbar{display:flex;align-items:center;gap:10px;margin:14px 16px 4px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:11px 14px;}
  .searchbar svg{width:19px;height:19px;color:var(--sub);flex:none;} .searchbar input{border:none;background:none;outline:none;color:var(--tx);font-size:15px;width:100%;}
</style>
</head>
<body>
<div id="app">
  <div id="head"></div>
  <div class="scroll" id="scroll"></div>
  <nav class="nav" id="nav">
    <button class="navb on" data-p="stocks">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="3" width="18" height="18" rx="4"/><path d="M7 14l3-3 2 2 4-4" stroke-linecap="round" stroke-linejoin="round"/></svg>Stocks</button>
    <button class="navb" data-p="fno">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3 17l5-6 4 3 5-8 4 5" stroke-linecap="round" stroke-linejoin="round"/></svg>F&amp;O</button>
    <button class="navb" data-p="mf">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 0 1 9 9h-9z" fill="currentColor" stroke="none"/></svg>Mutual Funds</button>
  </nav>
</div>

<div class="detail" id="detail">
  <div class="dbar" id="dbar">
    <div class="rndbtn" id="backBtn" style="border:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 5l-7 7 7 7" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <div class="dt"><div class="n" id="dName"></div><div class="s" id="dSym"></div></div>
    <div class="rndbtn" id="dStar" style="border:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 3l2.5 5.5L20 9l-4 4 1 6-5-3-5 3 1-6-4-4 5.5-.5z" stroke-linejoin="round"/></svg></div>
  </div>
  <div class="dscroll" id="dScroll">
    <div class="dprice tnum" id="dPrice"></div>
    <div class="dchg tnum" id="dChg"></div>
    <canvas class="dchart" id="dChart"></canvas>
    <div class="rng" id="rng"><button class="rb on" data-r="1D">1D</button><button class="rb" data-r="1W">1W</button><button class="rb" data-r="1M">1M</button><button class="rb" data-r="1Y">1Y</button></div>
    <div class="sechd" style="margin:6px 0 12px"><h2 style="font-size:16px">Overview</h2></div>
    <div class="stat" id="stat"></div>
    <div class="ownb" id="ownb" style="display:none"></div>
  </div>
  <div class="actbar"><button class="btn bsell" id="sellBtn">Sell</button><button class="btn bbuy" id="buyBtn">Buy</button></div>
</div>

<div class="bd" id="tbd"></div>
<div class="sheet" id="tsheet">
  <div class="grip"></div>
  <div class="shd"><button class="lk" id="tCancel">Cancel</button><h2 id="tTitle">Buy</h2><span style="width:48px"></span></div>
  <div class="sbody">
    <div class="ttop"><div class="logo" id="tLogo" style="width:38px;height:38px"></div><div><div class="n" id="tName"></div><div class="p tnum" id="tPrice"></div></div></div>
    <div id="tControls"></div>
    <button class="save" id="tConfirm" style="margin-top:16px">Buy</button>
    <p class="hint" id="tHint"></p>
  </div>
</div>

<div class="bd" id="sbd"></div>
<div class="sheet" id="ssheet">
  <div class="grip"></div>
  <div class="shd"><button class="lk" id="sCancel">Cancel</button><h2>Start a SIP</h2><span style="width:48px"></span></div>
  <div class="sbody">
    <div class="fld"><label>Mutual fund</label><input id="sFund" readonly></div>
    <div class="fld"><label>Monthly amount (₹)</label><input id="sAmt" inputmode="numeric" value="500"></div>
    <div class="chips" id="sChips"></div>
    <div class="fld"><label>SIP date (1-28)</label><input id="sDay" inputmode="numeric" value="13"></div>
    <button class="save" id="sConfirm">Start SIP</button>
  </div>

function drawTS(){document.querySelectorAll("canvas[data-ts]").forEach(function(cv){
  var kind=cv.getAttribute("data-kind"),dpr=window.devicePixelRatio||1,w=cv.clientWidth,h=70;if(!w)return;
  cv.width=w*dpr;cv.height=h*dpr;var x=cv.getContext("2d");if(!x)return;x.scale(dpr,dpr);x.clearRect(0,0,w,h);
  var up=kind==="bull",col=up?"#00c278":"#f2493e",seed=hash(cv.getAttribute("data-ts")+kind),n=26,pts=[],v=.5;
  function rnd(){seed=(seed*9301+49297)%233280;return seed/233280;}
  for(var i=0;i<n;i++){v+=(rnd()-.5)*.16;v=Math.max(.12,Math.min(.88,v));pts.push(v);}
  for(var j=n-6;j<n;j++){pts[j]+=(up?1:-1)*.05*(j-(n-6));pts[j]=Math.max(.08,Math.min(.92,pts[j]));}
  x.fillStyle=up?"rgba(0,194,120,.25)":"rgba(242,73,62,.25)";
  for(var b=0;b<n;b+=3){var bh=pts[b]*h*.6;x.fillRect(b/(n-1)*w-2,h-bh,4,bh);}
  x.beginPath();pts.forEach(function(p,i){var xx=i/(n-1)*w,yy=h-p*h;i?x.lineTo(xx,yy):x.moveTo(xx,yy);});
  x.strokeStyle=col;x.lineWidth=2;x.lineJoin="round";x.stroke();
  var lx=w,ly=h-pts[n-1]*h;x.beginPath();x.arc(lx-2,ly,3,0,7);x.fillStyle=col;x.fill();
});}

function refreshDetail(){var p=aPrice(curKind,curId),o=aOpen(curKind,curId),c=p-o,pct=o?c/o*100:0,up=c>=0;
  $("dPrice").textContent=inr(p,2);$("dChg").className="dchg tnum "+(up?"up":"dn");$("dChg").textContent=(up?"+":"")+inr(c,2)+" ("+(up?"+":"")+pct.toFixed(2)+"%) Today";
  if(cpts.length){cpts[cpts.length-1]=p;drawChart(up);}renderOwn();}
function buildChart(){var o=aOpen(curKind,curId),p=aPrice(curKind,curId),n=drange==="1D"?46:drange==="1W"?54:drange==="1M"?60:80;
  var vol=drange==="1D"?.006:drange==="1W"?.012:drange==="1M"?.02:.03,start=drange==="1D"?o:o*(.8+.3*(hash(curId+drange)%100)/100);
  var seed=hash(curId+drange),pts=[start];function rnd(){seed=(seed*9301+49297)%233280;return seed/233280;}
  for(var i=1;i<n-1;i++){var pv=pts[i-1],tg=start+(p-start)*(i/(n-1));pts.push(pv+(tg-pv)*.25+(rnd()-.5)*pv*vol);}
  pts.push(p);cpts=pts;drawChart(p>=(drange==="1D"?o:start));}
function drawChart(up){var cv=$("dChart"),dpr=window.devicePixelRatio||1,w=cv.clientWidth,h=170;if(!w)return;
  cv.width=w*dpr;cv.height=h*dpr;var x=cv.getContext("2d");if(!x)return;x.scale(dpr,dpr);x.clearRect(0,0,w,h);
  var lo=Math.min.apply(null,cpts),hi=Math.max.apply(null,cpts),rng=(hi-lo)||1,pad=12,col=up?"#00c278":"#f2493e";
  function X(i){return i/(cpts.length-1)*w;}function Y(v){return pad+(1-(v-lo)/rng)*(h-2*pad);}
  var ov=drange==="1D"?aOpen(curKind,curId):cpts[0];
  x.setLineDash([4,4]);x.strokeStyle="#2a2b31";x.lineWidth=1;x.beginPath();x.moveTo(0,Y(ov));x.lineTo(w,Y(ov));x.stroke();x.setLineDash([]);
  x.beginPath();cpts.forEach(function(v,i){i?x.lineTo(X(i),Y(v)):x.moveTo(X(i),Y(v));});
  var g=x.createLinearGradient(0,0,0,h);g.addColorStop(0,col+"33");g.addColorStop(1,col+"00");x.lineTo(w,h);x.lineTo(0,h);x.closePath();x.fillStyle=g;x.fill();
  x.beginPath();cpts.forEach(function(v,i){i?x.lineTo(X(i),Y(v)):x.moveTo(X(i),Y(v));});x.strokeStyle=col;x.lineWidth=2;x.lineJoin="round";x.stroke();
  x.beginPath();x.arc(X(cpts.length-1),Y(cpts[cpts.length-1]),3.2,0,7);x.fillStyle=col;x.fill();}
$("rng").querySelectorAll(".rb").forEach(function(b){b.addEventListener("click",function(){$("rng").querySelectorAll(".rb").forEach(function(x){x.classList.remove("on");});b.classList.add("on");drange=b.getAttribute("data-r");buildChart();});});
function renderStat(){var p=aPrice(curKind,curId),o=aOpen(curKind,curId),st;
  if(curKind==="mf"){var m=BYF[curId];st=[["Category",m.cat],["NAV",inr(p,2)],["Prev. NAV",inr(o,2)],["Fund type","Open-ended"],["52W low",inr(p*.78,2)],["52W high",inr(p*1.34,2)],["Expense ratio",(0.4+hash(curId)%120/100).toFixed(2)+"%"],["Min. SIP","₹100"]];}
  else{var m=BY[curId],lo=Math.min(p,o)*.99,hi=Math.max(p,o)*1.01,pe=12+hash(curId+"pe")%48;st=[["Open",inr(o,2)],["Prev. close",inr(o,2)],["Day low",inr(lo,2)],["Day high",inr(hi,2)],["52W low",inr(Math.min(p,o)*.72,2)],["52W high",inr(Math.max(p,o)*1.28,2)],["P/E ratio",pe.toFixed(1)],["Sector",m.sec]];}
  $("stat").innerHTML=st.map(function(s){return '<div class="c"><div class="l">'+s[0]+'</div><div class="v tnum">'+s[1]+'</div></div>';}).join("");}
function holdFor(kind,id){return kind==="mf"?state.funds.filter(function(h){return h.name===id;})[0]:state.stocks.filter(function(h){return h.sym===id;})[0];}
function renderOwn(){var hd=holdFor(curKind,curId),box=$("ownb"),mf=curKind==="mf";
  if(!hd){box.style.display="none";$("sellBtn").disabled=true;return;}box.style.display="block";$("sellBtn").disabled=false;
  var ltp=aPrice(curKind,curId),c=hd.qty*ltp,i=hd.qty*hd.avg,r=c-i,p=i?r/i*100:0;
  box.innerHTML='<div style="font-size:12px;color:var(--sub);letter-spacing:.06em;font-weight:700;margin-bottom:8px">YOUR HOLDINGS</div>'+
    '<div class="kv"><span class="k">'+(mf?"Units":"Quantity")+'</span><span class="v tnum">'+(mf?hd.qty.toFixed(3):hd.qty)+'</span></div>'+
    '<div class="kv"><span class="k">Avg. '+(mf?"NAV":"price")+'</span><span class="v tnum">'+inr(hd.avg,2)+'</span></div>'+
    '<div class="kv"><span class="k">Current value</span><span class="v tnum">'+inr(c)+'</span></div>'+
    '<div class="kv"><span class="k">Returns</span><span class="v tnum '+(r>=0?"up":"dn")+'">'+(r>=0?"+":"")+inr(r)+' ('+(r>=0?"+":"")+p.toFixed(2)+'%)</span></div>';}
$("dScroll").addEventListener("scroll",function(){$("dbar").style.borderBottomColor=this.scrollTop>4?"var(--border)":"transparent";});

var tmode="buy";
function computeT(){var p=aPrice(curKind,curId),hd=holdFor(curKind,curId);
  if(curKind!=="mf"){var qi=$("qInput"),q=Math.max(1,parseInt(qi?qi.value:1,10)||1);if(tmode==="sell"&&hd)q=Math.min(q,hd.qty);return {q:q,units:q,amt:q*p,p:p,hd:hd};}
  var ai=$("aInput"),a=Math.max(0,parseFloat(ai?ai.value:0)||0);if(tmode==="sell"&&hd){var mx=hd.qty*p;if(a>=mx-1)return {units:hd.qty,amt:hd.qty*p,p:p,hd:hd};}return {units:p?a/p:0,amt:a,p:p,hd:hd};}
function openTrade(mode){tmode=mode;var kind=curKind,id=curId,nm=aName(kind,id),p=aPrice(kind,id),hd=holdFor(kind,id),mf=kind==="mf";
  $("tTitle").textContent=mf?(mode==="buy"?"Invest":"Redeem"):(mode==="buy"?"Buy":"Sell");
  $("tLogo").style.background=color(nm);$("tLogo").innerHTML='<span>'+initials(nm)+'</span>'+((mf?mlogo(id):slogo(id))?'<img src="'+(mf?mlogo(id):slogo(id))+'" onerror="this.remove()">':'');
  $("tName").textContent=nm;$("tPrice").textContent=inr(p,2)+(mf?" NAV":" / share");
  var c=$("tControls"),h="";
  if(!mf){h='<div class="qr"><span class="k">Quantity</span><div class="step"><button id="qm">−</button><input id="qInput" inputmode="numeric" value="1"><button id="qp">+</button></div></div><div class="qr"><span class="k">Approx. price</span><span class="qv tnum" id="tUnit"></span></div><div class="qr"><span class="k">'+(mode==="buy"?"Order total":"You receive")+'</span><span class="qv tnum" id="tTot"></span></div><div class="balline"><span>'+(mode==="buy"?"Available balance":"You hold")+'</span><span class="tnum" id="tBal"></span></div>';
    c.innerHTML=h;$("qp").onclick=function(){$("qInput").value=(parseInt($("qInput").value,10)||0)+1;syncT();};$("qm").onclick=function(){$("qInput").value=Math.max(1,(parseInt($("qInput").value,10)||1)-1);syncT();};$("qInput").oninput=syncT;
  }else{h='<div class="fld"><label>'+(mode==="buy"?"Investment amount (₹)":"Redemption amount (₹)")+'</label><input id="aInput" inputmode="numeric" value="'+(mode==="buy"?"1000":"")+'" placeholder="0"></div>';
    if(mode==="buy")h+='<div class="chips" id="tChips">'+[500,1000,5000,10000].map(function(a){return '<button class="chip" data-a="'+a+'">+'+inr(a)+'</button>';}).join("")+'</div>';
    else h+='<button class="chip" id="rall" style="width:100%;margin:-2px 0 14px">Redeem all units</button>';
    h+='<div class="qr"><span class="k">Current NAV</span><span class="qv tnum" id="tUnit"></span></div><div class="qr"><span class="k">Est. units</span><span class="qv tnum" id="tUnits"></span></div><div class="balline"><span>'+(mode==="buy"?"Available balance":"Current value")+'</span><span class="tnum" id="tBal"></span></div>';
    c.innerHTML=h;$("aInput").oninput=syncT;
    if(mode==="buy")$("tChips").querySelectorAll(".chip").forEach(function(b){b.onclick=function(){$("aInput").value=(parseInt($("aInput").value,10)||0)+(+b.getAttribute("data-a"));syncT();};});
    else $("rall").onclick=function(){$("aInput").value=Math.floor(hd?hd.qty*aPrice(kind,id):0);syncT();};
  }
  $("tConfirm").textContent=mf?(mode==="buy"?"Invest now":"Redeem now"):((mode==="buy"?"Buy ":"Sell ")+nm.split(" ")[0]);
  syncT();$("tsheet").classList.add("open");$("tbd").classList.add("open");}
function closeTrade(){$("tsheet").classList.remove("open");$("tbd").classList.remove("open");}
function syncT(){var mf=curKind==="mf",p=aPrice(curKind,curId),t=computeT(),dis=false,hint="";$("tUnit").textContent=inr(p,2);
  if(!mf){$("qInput").value=t.q;$("tTot").textContent=inr(t.amt);if(tmode==="buy"){$("tBal").textContent=inr(state.balance);dis=t.amt>state.balance;hint=dis?"Not enough balance.":"";}else{$("tBal").textContent=(t.hd?t.hd.qty:0)+" shares";dis=!t.hd||t.q>t.hd.qty;}}
  else{$("tUnits").textContent=t.units.toFixed(3);if(tmode==="buy"){$("tBal").textContent=inr(state.balance);dis=t.amt>state.balance||t.amt<100;hint=t.amt>state.balance?"Not enough balance.":(t.amt>0&&t.amt<100?"Minimum ₹100.":"");}else{$("tBal").textContent=inr(t.hd?t.hd.qty*p:0);dis=!t.hd||t.amt<=0;}}
  $("tConfirm").disabled=dis;$("tHint").textContent=hint;}
$("tCancel").addEventListener("click",closeTrade);$("tbd").addEventListener("click",closeTrade);
$("buyBtn").addEventListener("click",function(){openTrade("buy");});
$("sellBtn").addEventListener("click",function(){if(holdFor(curKind,curId))openTrade("sell");});
$("tConfirm").addEventListener("click",function(){var kind=curKind,id=curId,nm=aName(kind,id),p=aPrice(kind,id),hd=holdFor(kind,id),t=computeT(),mf=kind==="mf";
  if(tmode==="buy"){if(t.amt>state.balance){toast("Not enough balance");return;}if(mf&&t.amt<100){toast("Minimum ₹100");return;}if(!mf&&t.amt<=0)return;state.balance-=t.amt;
    if(hd){hd.avg=(hd.avg*hd.qty+p*t.units)/(hd.qty+t.units);hd.qty+=t.units;}else{if(mf)state.funds.push({name:id,qty:t.units,avg:p});else state.stocks.push({sym:id,qty:t.units,avg:p});}
    order("BUY",kind,id,nm,t.units,p,t.amt);toast(mf?("Invested "+inr(t.amt)):("Bought "+t.units+" "+nm.split(" ")[0]));}
  else{if(!hd||t.amt<=0){toast("Nothing to "+(mf?"redeem":"sell"));return;}state.balance+=t.amt;hd.qty-=t.units;
    if(hd.qty<=1e-6){if(mf)state.funds=state.funds.filter(function(x){return x!==hd;});else state.stocks=state.stocks.filter(function(x){return x!==hd;});}
    order("SELL",kind,id,nm,t.units,p,t.amt);toast(mf?("Redeemed "+inr(t.amt)):("Sold "+t.units+" "+nm.split(" ")[0]));}
  save();closeTrade();renderOwn();});
function order(side,kind,id,name,units,p,total){state.orders.push({side:side,kind:kind,id:id,name:name,qty:units,px:p,total:total,ts:Date.now()});}

function openSip(fund){$("sFund").value=fund;$("sAmt").value=500;$("sDay").value=13;
  $("sChips").innerHTML=[500,1000,2500,5000].map(function(a){return '<button class="chip" data-a="'+a+'">+'+inr(a)+'</button>';}).join("");
  $("sChips").querySelectorAll(".chip").forEach(function(b){b.onclick=function(){$("sAmt").value=(parseInt($("sAmt").value,10)||0)+(+b.getAttribute("data-a"));};});
  $("ssheet").classList.add("open");$("sbd").classList.add("open");}
function closeSip(){$("ssheet").classList.remove("open");$("sbd").classList.remove("open");}
$("sCancel").addEventListener("click",closeSip);$("sbd").addEventListener("click",closeSip);
$("sConfirm").addEventListener("click",function(){var a=parseInt($("sAmt").value,10)||0,d=Math.min(28,Math.max(1,parseInt($("sDay").value,10)||1));if(a<100){toast("Minimum ₹100");return;}state.sips.push({fund:$("sFund").value,amount:a,day:d});save();closeSip();product="mf";tab="SIPs";syncNav();renderHead();renderBody();toast("SIP started");});

function openWallet(){$("wBal").textContent=inr(state.balance);$("wAmt").value="";
  $("wChips").innerHTML=[1000,5000,25000,50000].map(function(a){return '<button class="chip" data-a="'+a+'">+'+inr(a)+'</button>';}).join("");
  $("wChips").querySelectorAll(".chip").forEach(function(b){b.onclick=function(){$("wAmt").value=(parseInt($("wAmt").value,10)||0)+(+b.getAttribute("data-a"));};});
  $("wsheet").classList.add("open");$("wbd").classList.add("open");}
function closeWallet(){$("wsheet").classList.remove("open");$("wbd").classList.remove("open");}
$("wCancel").addEventListener("click",closeWallet);$("wbd").addEventListener("click",closeWallet);
$("wAdd").addEventListener("click",function(){var a=parseInt($("wAmt").value,10)||0;if(a<=0){toast("Enter an amount");return;}state.balance+=a;save();$("wBal").textContent=inr(state.balance);toast("Added "+inr(a));$("wAmt").value="";if(product==="mf"&&tab==="Dashboard")renderBody();});
$("wWithdraw").addEventListener("click",function(){var a=parseInt($("wAmt").value,10)||0;if(a<=0){toast("Enter an amount");return;}if(a>state.balance){toast("Amount exceeds balance");return;}state.balance-=a;save();$("wBal").textContent=inr(state.balance);toast("Withdrew "+inr(a));$("wAmt").value="";});

window.addEventListener("resize",function(){if($("detail").classList.contains("open")&&cpts.length)drawChart(true);if(product==="stocks"&&tab==="Explore")drawTS();});

state.stocks.forEach(function(h){px(h.sym);});U.forEach(function(r){px(r[0]);});state.funds.forEach(function(h){nav(h.name);});
renderHead();renderBody();setInterval(tick,3000);
})();
</script>
